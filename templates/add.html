{% extends "base.html" %}


{% block content %}


<h2>Add Patient</h2>


<form method="POST" class="card p-4 shadow">


<div class="mb-3">

<label>Name</label>

<input class="form-control"
name="full_name"
required>

</div>



<div class="mb-3">

<label>DOB</label>

<input type="date"
class="form-control"
name="dob"
max="{{today}}"
required>

</div>



<div class="mb-3">

<label>Email</label>

<input type="email"
class="form-control"
name="email"
required>

</div>



<div class="row">


<div class="col">

<label>Glucose</label>

<input type="number"
step="0.1"
class="form-control"
name="glucose">

</div>



<div class="col">

<label>Hemoglobin</label>

<input type="number"
step="0.1"
class="form-control"
name="hemoglobin">

</div>



<div class="col">

<label>Cholesterol</label>

<input type="number"
step="0.1"
class="form-control"
name="cholesterol">

</div>


</div>


<br>


<button class="btn btn-primary">

Predict Health

</button>


</form>


{% endblock %}
